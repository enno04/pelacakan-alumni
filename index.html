<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelacakan Alumni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Dashboard Pelacakan Alumni</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8">
                <h4>Data Target Pelacakan (Prodi Informatika UMM)</h4>
            </div>
            <div class="col-md-4 text-end">
                <button id="btnLacak" class="btn btn-primary" onclick="jalankanPelacakan()">Jalankan Pelacakan (Scheduler)</button>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Lengkap</th>
                            <th>Tahun Lulus</th>
                            <th>Status Pelacakan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAlumni">
                        <tr>
                            <td>ALM-001</td>
                            <td>Muhammad Rizky</td>
                            <td>2024</td>
                            <td><span class="badge bg-secondary" id="status-1">Belum Dilacak</span></td>
                            <td><button class="btn btn-sm btn-info" disabled>Lihat Jejak</button></td>
                        </tr>
                        <tr>
                            <td>ALM-002</td>
                            <td>Siti Aminah</td>
                            <td>2023</td>
                            <td><span class="badge bg-secondary" id="status-2">Belum Dilacak</span></td>
                            <td><button class="btn btn-sm btn-info" disabled>Lihat Jejak</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function jalankanPelacakan() {
            const btn = document.getElementById('btnLacak');
            btn.innerHTML = 'Melacak data dari sumber publik...';
            btn.disabled = true;

            // Simulasi proses pelacakan 3 detik
            setTimeout(() => {
                document.getElementById('status-1').className = 'badge bg-success';
                document.getElementById('status-1').innerText = 'Teridentifikasi Kuat';
                
                document.getElementById('status-2').className = 'badge bg-warning text-dark';
                document.getElementById('status-2').innerText = 'Perlu Verifikasi Manual';

                btn.innerHTML = 'Jalankan Pelacakan (Scheduler)';
                btn.disabled = false;
                alert('Job Pelacakan Selesai! Disambiguasi dan Verifikasi Silang berhasil dilakukan.');
            }, 3000);
        }
    </script>
</body>
</html>
